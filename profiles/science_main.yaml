journal: Science
profile: science_main
source_date: "2026-06-25"
source_refs:
  - references/source-links.md#science-main
widths:
  single:
    cm: 9
    mm: 90
    inch: 3.6
    picas: "21p3"
  double:
    cm: 18.3
    mm: 183
    inch: 7.25
    picas: "43p4"
font:
  family: ["Arial", "Helvetica", "DejaVu Sans", "sans-serif"]
  label_min_pt: 6
  label_max_pt: 9
  label_target_pt: 7
  tick_target_pt: 6
  max_font_levels: 3
panel_label:
  case: uppercase
  weight: bold
  target_pt: 10
line:
  min_pt: 0.28
  min_mm: 0.10
  target_pt: 0.75
  data_target_pt: 1.10
  error_bar_target_pt: 0.85
axis:
  default_spines: open
  spine_width_pt: 0.75
  ordinary_plots: "Use left/bottom spines only."
  framed_plots: ["heatmap", "image", "microscopy", "map", "confusion_matrix", "phase_diagram"]
tick:
  direction: out
  major_width_pt: 0.60
  major_length_pt: 2.50
  minor_visible: false
grid:
  default: false
  allowed_when_readout_matters: true
  major_only: true
  color: "#E5E5E5"
  linewidth_pt: 0.30
  alpha: 0.28
color:
  mode: RGB
  colorblind_safe: true
  avoid_red_green: true
  require_shape_or_texture_redundancy: true
raster:
  photographic_dpi_range: [300, 500]
  embedded_min_ppi: 300
  note: "Do not upsample; embedded raster inside vector files must be at least 300 ppi."
vector:
  preferred: true
  formats_preferred_order: ["ai", "vector eps", "pdf"]
  r_export_preference: "vector svg"
  preserve_text: true
export:
  default_formats: ["svg", "png"]
  default_purpose: ppt
  transparent_raster_for_ppt: true
  preview_dpi: 200
  final_raster_dpi: 300
